name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
      - 'unplugin-granularity-v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint package
        run: yarn workspace @feugene/granularity lint

  test-granularity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test package
        run: yarn test:granularity

  coverage-granularity:
    needs:
      - test-granularity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run coverage
        run: yarn coverage:granularity

      - name: Publish coverage summary
        if: always()
        run: |
          SUMMARY=packages/granularity/coverage/coverage-summary.json
          if [ -f "$SUMMARY" ]; then
            node -e 'const fs=require("node:fs");const s=JSON.parse(fs.readFileSync(process.argv[1],"utf8")).total;const rows=["lines","statements","functions","branches"].map(k=>`| ${k} | ${s[k].pct}% (${s[k].covered}/${s[k].total}) |`).join("\n");process.stdout.write("| Metric | Coverage |\n|---|---|\n"+rows+"\n");' "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'coverage-summary.json not found' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: granularity-coverage
          path: packages/granularity/coverage/
          if-no-files-found: warn

  build-granularity:
    needs:
      - lint
      - test-granularity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build package
        run: yarn build:granularity

      - name: Validate package metadata (publint)
        working-directory: packages/granularity
        run: npx --yes publint@latest --pack npm

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: granularity-dist
          path: packages/granularity/dist/

  test-showcase:
    needs:
      - build-granularity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download granularity dist
        uses: actions/download-artifact@v8
        with:
          name: granularity-dist
          path: packages/granularity/dist

      - name: Test showcase
        run: yarn test:showcase

  build-showcase:
    needs:
      - test-showcase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download granularity dist
        uses: actions/download-artifact@v8
        with:
          name: granularity-dist
          path: packages/granularity/dist

      - name: Build showcase
        run: yarn build:showcase

      - name: Upload showcase
        uses: actions/upload-artifact@v7
        with:
          name: showcase-dist
          path: apps/showcase/dist/

  deploy-showcase:
    needs:
      - build-showcase
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download showcase dist
        uses: actions/download-artifact@v8
        with:
          name: showcase-dist
          path: showcase-dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: showcase-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Публикация пакета в npm — первичный реестр.
  # Релиз не зависит от showcase, чтобы внешние зависимости витрины
  # (например, @feugene/fint-i18n) не блокировали публикацию @feugene/granularity.
  publish-npm:
    needs:
      - lint
      - test-granularity
      - build-granularity
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        working-directory: packages/granularity
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: granularity-dist
          path: packages/granularity/dist

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/granularity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Публикация в GitHub Packages как зеркало под scope владельца репозитория.
  # Отдельный job, чтобы сбой GPR не откатывал/не блокировал публикацию в npm.
  # Имя пакета в GPR отличается (`@efureev/granularity`), поэтому меняем его
  # на копии через `npm pkg set` (без `sed` по исходному package.json).
  publish-gpr:
    needs:
      - publish-npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@efureev'

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: granularity-dist
          path: packages/granularity/dist

      - name: Prepare package for GitHub Packages
        working-directory: packages/granularity
        run: |
          # GitHub Packages требует, чтобы scope совпадал с владельцем репозитория.
          # Меняем имя и отключаем provenance/publishConfig локально в рантайме —
          # без мутации исходного package.json в индексе git.
          npm pkg set name='@efureev/granularity'
          npm pkg delete publishConfig.provenance
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          node -e "const p=require('./package.json');console.log('publishing as:',p.name,'@',p.version)"

      - name: Publish to GitHub Packages
        working-directory: packages/granularity
        run: npm publish --ignore-scripts --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Сборка build-time пакета @feugene/unplugin-granularity (резолвер для
  # unplugin-vue-components). Артефакт нужен и для валидации (publint),
  # и для последующей публикации по тегу `unplugin-granularity-v*`.
  build-unplugin-granularity:
    needs:
      - lint
      - build-granularity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download granularity dist
        uses: actions/download-artifact@v8
        with:
          name: granularity-dist
          path: packages/granularity/dist

      - name: Build package
        run: yarn workspace @feugene/unplugin-granularity build

      - name: Validate package metadata (publint)
        working-directory: packages/unplugin-granularity
        run: npx --yes publint@latest --pack npm

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: unplugin-granularity-dist
          path: packages/unplugin-granularity/dist/

  # Публикация @feugene/unplugin-granularity в npm по тегу вида
  # `unplugin-granularity-v<semver>`. Отдельный тег позволяет релизить
  # build-time пакет независимо от рантайма @feugene/granularity.
  publish-npm-unplugin-granularity:
    needs:
      - build-unplugin-granularity
    if: startsWith(github.ref, 'refs/tags/unplugin-granularity-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        working-directory: packages/unplugin-granularity
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#unplugin-granularity-v}"
          echo "package.json version: $PKG_VERSION"
          echo "git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: unplugin-granularity-dist
          path: packages/unplugin-granularity/dist

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/unplugin-granularity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Зеркало в GitHub Packages под scope владельца репозитория
  # (`@efureev/unplugin-granularity`). Аналогично publish-gpr для granularity.
  publish-gpr-unplugin-granularity:
    needs:
      - publish-npm-unplugin-granularity
    if: startsWith(github.ref, 'refs/tags/unplugin-granularity-v')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://npm.pkg.github.com'
          scope: '@efureev'

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: unplugin-granularity-dist
          path: packages/unplugin-granularity/dist

      - name: Prepare package for GitHub Packages
        working-directory: packages/unplugin-granularity
        run: |
          npm pkg set name='@efureev/unplugin-granularity'
          npm pkg delete publishConfig.provenance
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          node -e "const p=require('./package.json');console.log('publishing as:',p.name,'@',p.version)"

      - name: Publish to GitHub Packages
        working-directory: packages/unplugin-granularity
        run: npm publish --ignore-scripts --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
