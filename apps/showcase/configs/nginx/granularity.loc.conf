## Nginx configuration for the Granularity Showcase (Vue 3 SPA).
##
## Usage:
##   1. Build the showcase (from the repo root):
##        yarn workspace @feugene/granularity-showcase build
##      The static bundle will be produced in `apps/showcase/dist`.
##
##   2. Add the host to your /etc/hosts:
##        127.0.0.1   granularity.loc
##
##   3. Include this file from your nginx config, e.g.:
##        include /absolute/path/to/apps/showcase/configs/nginx/granularity.loc.conf;
##      or symlink it into `/usr/local/etc/nginx/servers/` (Homebrew) /
##      `/etc/nginx/sites-enabled/` (Linux) and reload nginx:
##        nginx -t && nginx -s reload
##
##   4. IMPORTANT: replace `__SHOWCASE_DIST__` below with the absolute path to
##      `apps/showcase/dist` on your machine, e.g.
##      `/Volumes/dev/feugene/js/packages/granularity/apps/showcase/dist`.
##
## Notes:
## - The showcase uses `createWebHistory` with base `/` in dev and `/granularity/`
##   in production builds (see `apps/showcase/vite.config.ts`). For local serving
##   under a dedicated domain we keep URLs at the root and fall back any unknown
##   path to `index.html` so client-side routing works for deep links.
## - If you prefer to mirror the GitHub Pages layout (`/granularity/...`),
##   change `base` in `vite.config.ts` accordingly or use the `location /granularity/`
##   block at the bottom of this file (commented out by default).

server {
    listen      80;
    listen      [::]:80;
    server_name granularity.loc;

    # Absolute path to the built SPA (`apps/showcase/dist`).
    root  __SHOWCASE_DIST__;
    index index.html;

    charset utf-8;

    access_log /usr/local/var/log/nginx/granularity.loc.access.log;
    error_log  /usr/local/var/log/nginx/granularity.loc.error.log warn;

    # Reasonable upload size for a static site.
    client_max_body_size 8m;

    # Gzip — small but useful for JS/CSS bundles.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Long-term caching for hashed assets produced by Vite (`/assets/*`).
    location ^~ /assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # Static files with long cache (fonts, images, etc.).
    location ~* \.(?:woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp|avif|mp4|webm)$ {
        access_log off;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files  $uri =404;
    }

    # HTML should never be cached by the browser — Vite hashes assets, not HTML.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files  $uri =404;
    }

    # SPA fallback: every unknown path returns `index.html` so Vue Router can
    # resolve it on the client (e.g. /components, /composables, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to dotfiles (e.g. .git, .env) that might accidentally end up in dist.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --- Optional: serve the app under `/granularity/` prefix (mirrors GH Pages).
    # Uncomment this block (and comment out the `location /` above) if you build
    # the showcase with `base: '/granularity/'` and want the same URLs locally.
    #
    # location /granularity/ {
    #     alias __SHOWCASE_DIST__/;
    #     try_files $uri $uri/ /granularity/index.html;
    # }
}
